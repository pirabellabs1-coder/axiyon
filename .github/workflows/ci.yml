name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  # ─── Backend ────────────────────────────────────────────────────
  backend:
    name: Backend (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: axion
          POSTGRES_PASSWORD: axion
          POSTGRES_DB: axion_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U axion"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src/ tests/

      - name: Format check (ruff)
        working-directory: backend
        run: ruff format --check src/ tests/

      - name: Type-check (mypy)
        working-directory: backend
        continue-on-error: true   # iterative; will hard-fail in 1.0.1
        run: mypy src/

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://axion:axion@localhost:5432/axion_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: test-secret
        run: pytest -q --cov=src/axion --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ─── Python SDK ─────────────────────────────────────────────────
  sdk-python:
    name: Python SDK (build + import)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build
          python -m build
          pip install dist/*.whl
          python -c "import axion; from axion import Axion, Workflow; print(axion.__version__)"

  # ─── TypeScript SDK ─────────────────────────────────────────────
  sdk-typescript:
    name: TypeScript SDK (build + typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: sdk/typescript
        run: |
          npm ci || npm install
          npm run typecheck
          npm run build

  # ─── CLI ────────────────────────────────────────────────────────
  cli:
    name: CLI (build + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          pip install ./sdk/python ./cli
          axion --help

  # ─── Docker images ──────────────────────────────────────────────
  docker:
    name: Docker (api + worker)
    runs-on: ubuntu-latest
    needs: [backend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/axion-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/axion-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile.worker
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/axion-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/axion-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Helm lint ──────────────────────────────────────────────────
  helm:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint infrastructure/helm
      - run: helm template axion infrastructure/helm > /tmp/render.yaml
      - run: kubectl --dry-run=client apply -f /tmp/render.yaml || true
