---
apiVersion: v1
kind: ConfigMap
metadata:
  name: axion-config
  namespace: axion
data:
  ENV: "production"
  REGION: "eu-west-3"
  LOG_LEVEL: "INFO"
  API_PREFIX: "/v1"
  CORS_ORIGINS: "https://app.axion.ai"
  DEFAULT_MODEL: "claude-opus-4-7"
  FALLBACK_MODEL: "gpt-4o"
  S3_BUCKET_AUDIT: "axion-production-audit"
  OTEL_SERVICE_NAME: "axion-api"
---
# NOTE: this manifests a placeholder Secret. In production, this Secret is
# managed by external-secrets / sealed-secrets / SOPS — never plain values.
apiVersion: v1
kind: Secret
metadata:
  name: axion-secrets
  namespace: axion
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS"
  DATABASE_URL: "REPLACE_VIA_EXTERNAL_SECRETS"
  REDIS_URL: "REPLACE_VIA_EXTERNAL_SECRETS"
  CELERY_BROKER_URL: "REPLACE_VIA_EXTERNAL_SECRETS"
  CELERY_RESULT_BACKEND: "REPLACE_VIA_EXTERNAL_SECRETS"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  MISTRAL_API_KEY: ""
  STRIPE_SECRET_KEY: ""
  STRIPE_WEBHOOK_SECRET: ""
  AXION_ENCRYPTION_KEY: "REPLACE_VIA_EXTERNAL_SECRETS"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: axion
  namespace: axion
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/axion-prod-irsa
