# Default values for the Axion Helm chart.
# Override these in production via -f values.prod.yaml.

global:
  image:
    registry: ghcr.io/axion-labs
    pullPolicy: IfNotPresent
    pullSecrets: []
  imageTag: "1.0.0"
  region: eu-west-3
  env: production

api:
  enabled: true
  replicas: 4
  image:
    repository: axion-api
    tag: ""
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
  service:
    type: ClusterIP
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/proxy-body-size: 16m
    hosts:
      - host: api.axion.ai
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: axion-api-tls
        hosts: ["api.axion.ai"]
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
  livenessProbe:
    httpGet: { path: /health, port: 8000 }
    initialDelaySeconds: 15
    periodSeconds: 30
  readinessProbe:
    httpGet: { path: /ready, port: 8000 }
    initialDelaySeconds: 5
    periodSeconds: 10
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 40
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

worker:
  enabled: true
  replicas: 8
  image:
    repository: axion-worker
    tag: ""
  resources:
    requests:
      cpu: 250m
      memory: 768Mi
    limits:
      cpu: 1500m
      memory: 1.5Gi
  autoscaling:
    enabled: true
    minReplicas: 8
    maxReplicas: 100
    targetCPUUtilizationPercentage: 75

beat:
  enabled: true
  replicas: 1   # singleton — must not be scaled
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 250m, memory: 256Mi }

# ── External services ────────────────────────────────
postgres:
  external:
    enabled: true
    host: axion-prod-rds.cluster-xxxx.eu-west-3.rds.amazonaws.com
    port: 5432
    database: axion
    secretName: axion-db-secret
    secretKeyUser: username
    secretKeyPassword: password

redis:
  external:
    enabled: true
    url: redis://axion-prod-redis.xxxx.cache.amazonaws.com:6379

# ── Secrets references (use external-secrets or sealed-secrets) ──
secrets:
  jwt:
    secretName: axion-jwt
    secretKey: jwt-secret
  llm:
    secretName: axion-llm
    secretKeyAnthropic: anthropic
    secretKeyOpenai: openai
    secretKeyMistral: mistral
  stripe:
    secretName: axion-stripe
    secretKeySecret: stripe-secret-key
    secretKeyWebhook: stripe-webhook-secret
  encryption:
    secretName: axion-encryption-key

serviceAccount:
  create: true
  name: axion
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/axion-prod-irsa

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

networkPolicy:
  enabled: true

monitoring:
  serviceMonitor:
    enabled: true
    namespace: monitoring
    interval: 30s
