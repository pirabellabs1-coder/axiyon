{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "axion.fullname" . }}-api
  labels:
    {{- include "axion.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicas }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "axion.labels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "axion.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
      annotations:
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "axion.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: {{ include "axion.image" (dict "Values" .Values "repo" .Values.api) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          command: ["uvicorn", "axion.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- include "axion.envSecrets" . | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "axion.fullname" . }}-config
                optional: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: api
                topologyKey: kubernetes.io/hostname
{{- end }}
